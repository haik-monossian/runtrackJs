<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription | Premium App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Créer un compte</h1>
        <p class="subtitle">Rejoignez-nous dès aujourd'hui</p>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="nom">Nom</label>
                <div class="input-container">
                    <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom</label>
                <div class="input-container">
                    <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-container">
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="input-container">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <div class="password-toggle" id="togglePassword">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="adresse">Adresse</label>
                <div class="input-container">
                    <input type="text" id="adresse" name="adresse" placeholder="Votre adresse" required>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="zip">Code postal</label>
                <div class="input-container">
                    <input type="text" id="zip" name="zip" placeholder="75000" required>
                    <div class="validation-spinner"></div>
                </div>
                <div class="error-message"></div>
            </div>

            <button type="submit">S'inscrire</button>
        </form>

        <div class="link-container">
            Déjà inscrit ? <a href="connexion.html">Se connecter</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
