<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jour 4 - Job 05 - ZenQuotes</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --text: #f8fafc;
            --card: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .quote-container {
            background: var(--card);
            backdrop-filter: blur(12px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #quote-display {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1rem;
        }

        .quote-text {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.4;
            color: #e2e8f0;
        }

        .quote-author {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #get-quote {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
        }

        #get-quote:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.23);
        }

        #get-quote:active {
            transform: scale(0.98);
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="quote-container">
        <h1>Inspiration du jour</h1>
        <div id="quote-display">
            <div class="loader" id="loader"></div>
            <p class="quote-text" id="text">Cliquez sur le bouton pour recevoir une dose d'inspiration.</p>
            <p class="quote-author" id="author"></p>
        </div>
        <button id="get-quote">Nouvelle Citation</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
